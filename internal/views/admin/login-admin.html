<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Admin CMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-screen flex items-center justify-center bg-gray-100">
  <div class="w-full max-w-sm">
    <div class="bg-white shadow rounded-lg overflow-hidden">
      <div class="bg-gray-800 text-white px-6 py-4">
        <h1 class="text-lg font-semibold">Admin CMS</h1>
      </div>
      <form method="POST" action="/admin/login" class="p-6 space-y-4">
        {{if .Error}}
        <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded px-4 py-3">{{.Error}}</div>
        {{end}}
        <div>
          <label for="email" class="block text-gray-700 font-medium mb-2">Email</label>
          <input type="email" id="email" name="email" required autofocus value="{{if .Email}}{{.Email}}{{end}}"
            class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label for="password" class="block text-gray-700 font-medium mb-2">Password</label>
          <input type="password" id="password" name="password" required
            class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit"
          class="w-full bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition-colors">
          Sign in
        </button>
      </form>
    </div>
  </div>
</body>

</html>
