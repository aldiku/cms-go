{{ define "content" }}
<div class="w-full mx-auto py-8 space-y-6">

  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Users</h1>
    <a href="/admin/users/new" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition-colors">
      + New User
    </a>
  </div>

  <div class="bg-white shadow rounded-lg overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-800 text-white">
          <tr>
            <th class="px-6 py-3 text-left text-sm font-semibold">ID</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Name</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Email</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Role</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Status</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Action</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          {{ range .Users }}
          <tr class="hover:bg-gray-50">
            <td class="px-6 py-4 text-sm text-gray-700">{{ .ID }}</td>
            <td class="px-6 py-4 text-sm font-medium text-gray-900">{{ .FullName }}</td>
            <td class="px-6 py-4 text-sm text-gray-700">{{ .Email }}</td>
            <td class="px-6 py-4 text-sm text-gray-700">{{ .Role.Role }}</td>
            <td class="px-6 py-4 text-sm">
              {{ if eq .Status 1 }}
              <span class="px-2 py-1 text-xs rounded bg-green-100 text-green-700">Active</span>
              {{ else }}
              <span class="px-2 py-1 text-xs rounded bg-gray-100 text-gray-600">Inactive</span>
              {{ end }}
            </td>
            <td class="px-6 py-4 text-sm">
              <div class="flex space-x-4">
                <a href="/admin/users/{{ .ID }}/edit" class="text-blue-500 hover:underline">Edit</a>
                <form method="POST" action="/admin/users/{{ .ID }}/delete" onsubmit="return confirm('Delete this user?');">
                  <button type="submit" class="text-red-500 hover:underline">Delete</button>
                </form>
              </div>
            </td>
          </tr>
          {{ else }}
          <tr>
            <td colspan="6" class="px-6 py-4 text-sm text-gray-500 text-center">No users found.</td>
          </tr>
          {{ end }}
        </tbody>
      </table>
    </div>
  </div>

</div>
{{ end }}
