{{ define "content" }}
<div class="mx-auto space-y-6">

  <!-- Breadcrumb -->
  <div class="mb-6 flex flex-wrap items-center justify-between gap-3">
    <h2 class="text-xl font-semibold text-gray-800">Dashboard</h2>
    <nav>
      <ol class="flex items-center gap-1.5">
        <li>
          <a href="/admin" class="inline-flex items-center gap-1.5 text-sm text-gray-500">
            Home
          </a>
        </li>
      </ol>
    </nav>
  </div>

  <!-- Metric Cards -->
  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4 md:gap-6">
    <!-- Pages -->
    <div class="rounded-2xl border border-gray-200 bg-white p-5 md:p-6">
      <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-indigo-50">
        <svg class="fill-indigo-600" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M5.5 3.25C4.25736 3.25 3.25 4.25736 3.25 5.5V18.5C3.25 19.7426 4.25736 20.75 5.5 20.75H18.5001C19.7427 20.75 20.7501 19.7426 20.7501 18.5V5.5C20.7501 4.25736 19.7427 3.25 18.5001 3.25H5.5ZM4.75 5.5C4.75 5.08579 5.08579 4.75 5.5 4.75H18.5001C18.9143 4.75 19.2501 5.08579 19.2501 5.5V18.5C19.2501 18.9142 18.9143 19.25 18.5001 19.25H5.5C5.08579 19.25 4.75 18.9142 4.75 18.5V5.5ZM6.25005 9.7143C6.25005 9.30008 6.58583 8.9643 7.00005 8.9643L17 8.96429C17.4143 8.96429 17.75 9.30008 17.75 9.71429C17.75 10.1285 17.4143 10.4643 17 10.4643L7.00005 10.4643C6.58583 10.4643 6.25005 10.1285 6.25005 9.7143ZM6.25005 14.2857C6.25005 13.8715 6.58583 13.5357 7.00005 13.5357H17C17.4143 13.5357 17.75 13.8715 17.75 14.2857C17.75 14.6999 17.4143 15.0357 17 15.0357H7.00005C6.58583 15.0357 6.25005 14.6999 6.25005 14.2857Z" fill=""/>
        </svg>
      </div>
      <div class="mt-5 flex items-end justify-between">
        <div>
          <span class="text-sm text-gray-500">Pages</span>
          <h4 class="mt-2 text-2xl font-bold text-gray-800">{{ .PageCount }}</h4>
        </div>
        <a href="/admin/pages" class="text-sm text-indigo-600 hover:text-indigo-700 font-medium">View →</a>
      </div>
    </div>

    <!-- Layouts -->
    <div class="rounded-2xl border border-gray-200 bg-white p-5 md:p-6">
      <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-emerald-50">
        <svg class="fill-emerald-600" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M3.25 5.5C3.25 4.25736 4.25736 3.25 5.5 3.25H18.5C19.7426 3.25 20.75 4.25736 20.75 5.5V18.5C20.75 19.7426 19.7426 20.75 18.5 20.75H5.5C4.25736 20.75 3.25 19.7426 3.25 18.5V5.5ZM5.5 4.75C5.08579 4.75 4.75 5.08579 4.75 5.5V8.58325L19.25 8.58325V5.5C19.25 5.08579 18.9142 4.75 18.5 4.75H5.5ZM19.25 10.0833H15.416V13.9165H19.25V10.0833ZM13.916 10.0833L10.083 10.0833V13.9165L13.916 13.9165V10.0833ZM8.58301 10.0833H4.75V13.9165H8.58301V10.0833ZM4.75 18.5V15.4165H8.58301V19.25H5.5C5.08579 19.25 4.75 18.9142 4.75 18.5ZM10.083 19.25V15.4165L13.916 15.4165V19.25H10.083ZM15.416 19.25V15.4165H19.25V18.5C19.25 18.9142 18.9142 19.25 18.5 19.25H15.416Z" fill=""/>
        </svg>
      </div>
      <div class="mt-5 flex items-end justify-between">
        <div>
          <span class="text-sm text-gray-500">Layouts</span>
          <h4 class="mt-2 text-2xl font-bold text-gray-800">{{ .LayoutCount }}</h4>
        </div>
        <a href="/admin/layouts" class="text-sm text-emerald-600 hover:text-emerald-700 font-medium">View →</a>
      </div>
    </div>

    <!-- Components -->
    <div class="rounded-2xl border border-gray-200 bg-white p-5 md:p-6">
      <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-amber-50">
        <svg class="fill-amber-600" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M11.665 3.75621C11.8762 3.65064 12.1247 3.65064 12.3358 3.75621L18.7807 6.97856L12.3358 10.2009C12.1247 10.3065 11.8762 10.3065 11.665 10.2009L5.22014 6.97856L11.665 3.75621ZM4.29297 8.19203V16.0946C4.29297 16.3787 4.45347 16.6384 4.70757 16.7654L11.25 20.0366V11.6513C11.1631 11.6205 11.0777 11.5843 10.9942 11.5426L4.29297 8.19203ZM12.75 20.037L19.2933 16.7654C19.5474 16.6384 19.7079 16.3787 19.7079 16.0946V8.19202L13.0066 11.5426C12.9229 11.5844 12.8372 11.6208 12.75 11.6516V20.037ZM13.0066 2.41456C12.3732 2.09786 11.6277 2.09786 10.9942 2.41456L4.03676 5.89319C3.27449 6.27432 2.79297 7.05342 2.79297 7.90566V16.0946C2.79297 16.9469 3.27448 17.726 4.03676 18.1071L10.9942 21.5857L11.3296 20.9149L10.9942 21.5857C11.6277 21.9024 12.3732 21.9024 13.0066 21.5857L19.9641 18.1071C20.7264 17.726 21.2079 16.9469 21.2079 16.0946V7.90566C21.2079 7.05342 20.7264 6.27432 19.9641 5.89319L13.0066 2.41456Z" fill=""/>
        </svg>
      </div>
      <div class="mt-5 flex items-end justify-between">
        <div>
          <span class="text-sm text-gray-500">Components</span>
          <h4 class="mt-2 text-2xl font-bold text-gray-800">{{ .ComponentCount }}</h4>
        </div>
        <a href="/admin/components" class="text-sm text-amber-600 hover:text-amber-700 font-medium">View →</a>
      </div>
    </div>

    <!-- Users -->
    <div class="rounded-2xl border border-gray-200 bg-white p-5 md:p-6">
      <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-rose-50">
        <svg class="fill-rose-600" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M8.80443 5.60156C7.59109 5.60156 6.60749 6.58517 6.60749 7.79851C6.60749 9.01185 7.59109 9.99545 8.80443 9.99545C10.0178 9.99545 11.0014 9.01185 11.0014 7.79851C11.0014 6.58517 10.0178 5.60156 8.80443 5.60156ZM5.10749 7.79851C5.10749 5.75674 6.76267 4.10156 8.80443 4.10156C10.8462 4.10156 12.5014 5.75674 12.5014 7.79851C12.5014 9.84027 10.8462 11.4955 8.80443 11.4955C6.76267 11.4955 5.10749 9.84027 5.10749 7.79851ZM4.86252 15.3208C4.08769 16.0881 3.70377 17.0608 3.51705 17.8611C3.48384 18.0034 3.5211 18.1175 3.60712 18.2112C3.70161 18.3141 3.86659 18.3987 4.07591 18.3987H13.4249C13.6343 18.3987 13.7992 18.3141 13.8937 18.2112C13.9797 18.1175 14.017 18.0034 13.9838 17.8611C13.7971 17.0608 13.4132 16.0881 12.6383 15.3208C11.8821 14.572 10.6899 13.955 8.75042 13.955C6.81096 13.955 5.61877 14.572 4.86252 15.3208ZM3.8071 14.2549C4.87163 13.2009 6.45602 12.455 8.75042 12.455C11.0448 12.455 12.6292 13.2009 13.6937 14.2549C14.7397 15.2906 15.2207 16.5607 15.4446 17.5202C15.7658 18.8971 14.6071 19.8987 13.4249 19.8987H4.07591C2.89369 19.8987 1.73504 18.8971 2.05628 17.5202C2.28015 16.5607 2.76117 15.2906 3.8071 14.2549Z" fill=""/>
        </svg>
      </div>
      <div class="mt-5 flex items-end justify-between">
        <div>
          <span class="text-sm text-gray-500">Users</span>
          <h4 class="mt-2 text-2xl font-bold text-gray-800">{{ .UserCount }}</h4>
        </div>
        <a href="/admin/users" class="text-sm text-rose-600 hover:text-rose-700 font-medium">View →</a>
      </div>
    </div>
  </div>

</div>
{{ end }}
