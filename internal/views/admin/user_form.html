{{ define "content" }}
<div class="max-w-2xl mx-auto space-y-6">

  <div class="flex flex-wrap items-center justify-between gap-3">
    <h2 class="text-xl font-semibold text-gray-800">{{if .User.ID}}Edit User: {{.User.Email}}{{else}}Create New User{{end}}</h2>
    <a href="/admin/users" class="inline-flex items-center gap-2 rounded-lg border border-gray-300 px-4 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50">&larr; Back to Users</a>
  </div>

  <div class="rounded-2xl border border-gray-200 bg-white">
    <div class="p-5 sm:p-6">
      <form method="POST" action="{{if .User.ID}}/admin/users/{{.User.ID}}/edit{{else}}/admin/users/new{{end}}" class="space-y-6">

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="firstname" class="mb-1.5 block text-sm font-medium text-gray-700">First name</label>
            <input type="text" id="firstname" name="firstname" required value="{{.User.Firstname}}"
              class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 placeholder:text-gray-400 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 focus:outline-none">
          </div>
          <div>
            <label for="lastname" class="mb-1.5 block text-sm font-medium text-gray-700">Last name</label>
            <input type="text" id="lastname" name="lastname" value="{{.User.Lastname}}"
              class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 placeholder:text-gray-400 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 focus:outline-none">
          </div>
        </div>

        <div>
          <label for="email" class="mb-1.5 block text-sm font-medium text-gray-700">Email</label>
          <input type="email" id="email" name="email" required value="{{.User.Email}}"
            class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 placeholder:text-gray-400 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 focus:outline-none">
        </div>

        <div>
          <label for="password" class="mb-1.5 block text-sm font-medium text-gray-700">Password</label>
          <input type="password" id="password" name="password"
            placeholder="{{if .User.ID}}Leave blank to keep current password{{end}}" {{if not .User.ID}}required{{end}}
            class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 placeholder:text-gray-400 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 focus:outline-none">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="phone" class="mb-1.5 block text-sm font-medium text-gray-700">Phone</label>
            <input type="text" id="phone" name="phone" value="{{.User.Phone}}"
              class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 placeholder:text-gray-400 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 focus:outline-none">
          </div>
          <div>
            <label for="employee_id" class="mb-1.5 block text-sm font-medium text-gray-700">Employee ID</label>
            <input type="text" id="employee_id" name="employee_id" value="{{.User.EmployeeID}}"
              class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 placeholder:text-gray-400 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 focus:outline-none">
          </div>
        </div>

        <div>
          <label for="company" class="mb-1.5 block text-sm font-medium text-gray-700">Company</label>
          <input type="text" id="company" name="company" value="{{.User.Company}}"
            class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 placeholder:text-gray-400 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 focus:outline-none">
        </div>

        <div>
          <label for="address" class="mb-1.5 block text-sm font-medium text-gray-700">Address</label>
          <textarea id="address" name="address" rows="2"
            class="w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 placeholder:text-gray-400 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 focus:outline-none">{{.User.Address}}</textarea>
        </div>

        <div>
          <label for="avatar" class="mb-1.5 block text-sm font-medium text-gray-700">Avatar URL</label>
          <input type="text" id="avatar" name="avatar" value="{{.User.Avatar}}"
            class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 placeholder:text-gray-400 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 focus:outline-none">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 items-end">
          <div>
            <label for="role_id" class="mb-1.5 block text-sm font-medium text-gray-700">Role</label>
            <select id="role_id" name="role_id"
              class="h-11 w-full rounded-lg border border-gray-300 bg-transparent px-4 py-2.5 text-sm text-gray-800 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 focus:outline-none">
              {{ range .Roles }}
              <option value="{{ .ID }}" {{if eq $.User.RoleID .ID}}selected{{end}}>{{ .Role }}</option>
              {{ end }}
            </select>
          </div>
          <label class="flex items-center gap-2 pb-2 cursor-pointer">
            <input type="checkbox" name="status" {{if eq .User.Status 1}}checked{{end}} {{if not .User.ID}}checked{{end}}
              class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
            <span class="text-sm text-gray-700">Active</span>
          </label>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
          <a href="/admin/users" class="inline-flex items-center rounded-lg border border-gray-300 px-6 py-2.5 text-sm font-medium text-gray-700 hover:bg-gray-50">Cancel</a>
          <button type="submit" class="inline-flex items-center gap-2 rounded-lg bg-green-600 px-6 py-2.5 text-sm font-medium text-white shadow-sm hover:bg-green-700 transition-colors">
            <svg class="fill-current" width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M10 3.75C10.4142 3.75 10.75 4.08579 10.75 4.5V9.25H15.5C15.9142 9.25 16.25 9.58579 16.25 10C16.25 10.4142 15.9142 10.75 15.5 10.75H10.75V15.5C10.75 15.9142 10.4142 16.25 10 16.25C9.58579 16.25 9.25 15.9142 9.25 15.5V10.75H4.5C4.08579 10.75 3.75 10.4142 3.75 10C3.75 9.58579 4.08579 9.25 4.5 9.25H9.25V4.5C9.25 4.08579 9.58579 3.75 10 3.75Z" fill=""/>
            </svg>
            Save
          </button>
        </div>

      </form>
    </div>
  </div>

</div>
{{ end }}
