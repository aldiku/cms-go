{{ define "content" }}
<div class="max-w-2xl mx-auto py-8">
  <div class="bg-white shadow rounded-lg overflow-hidden">
    <div class="bg-blue-600 text-white px-6 py-4">
      <h4 class="text-lg font-semibold mb-0">
        {{if .Menu.ID}}Edit Menu: {{.Menu.Menu}}{{else}}Create New Menu{{end}}
      </h4>
    </div>

    <form method="POST" action="{{if .Menu.ID}}/admin/menus/{{.Menu.ID}}/edit{{else}}/admin/menus/new{{end}}"
      class="p-6 space-y-4">

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label for="menu" class="block text-gray-700 font-medium mb-2">Menu name</label>
          <input type="text" id="menu" name="menu" required value="{{.Menu.Menu}}"
            class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label for="icon" class="block text-gray-700 font-medium mb-2">Icon</label>
          <input type="text" id="icon" name="icon" value="{{.Menu.Icon}}" placeholder="e.g. 📄"
            class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <div>
        <label for="path" class="block text-gray-700 font-medium mb-2">Path</label>
        <input type="text" id="path" name="path" required value="{{.Menu.Path}}" placeholder="/admin/example"
          class="w-full border border-gray-300 rounded px-4 py-2 font-mono focus:outline-none focus:ring-2 focus:ring-blue-500">
        <p class="text-xs text-gray-400 mt-1">Admin routes are matched to this path by prefix for permission checks.</p>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
          <label for="parent_id" class="block text-gray-700 font-medium mb-2">Parent</label>
          <select id="parent_id" name="parent_id"
            class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="0">— None —</option>
            {{ range .Parents }}
            <option value="{{ .ID }}" {{if eq $.Menu.ParentID .ID}}selected{{end}}>{{ .Menu }}</option>
            {{ end }}
          </select>
        </div>
        <div>
          <label for="list_order" class="block text-gray-700 font-medium mb-2">Order</label>
          <input type="number" id="list_order" name="list_order" min="0" value="{{.Menu.ListOrder}}"
            class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label for="menu_type" class="block text-gray-700 font-medium mb-2">Type</label>
          <input type="text" id="menu_type" name="menu_type" value="{{.Menu.MenuType}}" placeholder="module / settings"
            class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <div>
        <label for="menu_description" class="block text-gray-700 font-medium mb-2">Description</label>
        <textarea id="menu_description" name="menu_description" rows="2"
          class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">{{.Menu.MenuDescription}}</textarea>
      </div>

      <label class="flex items-center gap-2">
        <input type="checkbox" name="status" {{if eq .Menu.Status 1}}checked{{end}} {{if not .Menu.ID}}checked{{end}}>
        <span class="text-gray-700">Active (visible in sidebar and routable)</span>
      </label>

      <div class="flex justify-end gap-3 pt-4 border-t border-gray-200">
        <a href="/admin/menus" class="px-6 py-2 border border-gray-300 rounded hover:bg-gray-50">Cancel</a>
        <button type="submit" class="bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600 transition-colors">
          💾 Save
        </button>
      </div>

    </form>
  </div>
</div>
{{ end }}
