{{ define "content" }}
<div class="max-w-lg mx-auto py-8">
  <div class="bg-white shadow rounded-lg overflow-hidden">
    <div class="bg-blue-600 text-white px-6 py-4">
      <h4 class="text-lg font-semibold mb-0">
        {{if .Role.ID}}Edit Role: {{.Role.Role}}{{else}}Create New Role{{end}}
      </h4>
    </div>

    <form method="POST" action="{{if .Role.ID}}/admin/roles/{{.Role.ID}}/edit{{else}}/admin/roles/new{{end}}"
      class="p-6 space-y-4">

      <div>
        <label for="role" class="block text-gray-700 font-medium mb-2">Role name</label>
        <input type="text" id="role" name="role" required value="{{.Role.Role}}"
          class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <label class="flex items-center gap-2">
        <input type="checkbox" name="status" {{if eq .Role.Status 1}}checked{{end}} {{if not .Role.ID}}checked{{end}}>
        <span class="text-gray-700">Active</span>
      </label>

      <div class="flex justify-end gap-3 pt-4 border-t border-gray-200">
        <a href="/admin/roles" class="px-6 py-2 border border-gray-300 rounded hover:bg-gray-50">Cancel</a>
        <button type="submit" class="bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600 transition-colors">
          💾 Save
        </button>
      </div>

    </form>
  </div>
</div>
{{ end }}
